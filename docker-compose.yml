services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: site
      POSTGRES_PASSWORD: site
      POSTGRES_DB: site
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U site -d site"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./apps/api/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    ports:
      - "5432:5432"

  api:
    build:
      context: ./apps/api
    environment:
      PORT: 8080
      DATABASE_URL: postgres://site:site@db:5432/site?sslmode=disable
      RSVP_TOKEN_PEPPER: pKGVgRXHA6Q151wIsbbkOXtOKlpLrr9FTQhy/hakrEw=
      ADMIN_TOKEN: 3toTe3G2V3xuWdJz0kCH/A==
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      args:
        PUBLIC_API_BASE_URL: /api
    depends_on:
      - api
    ports:
      - "4321:80"

volumes:
  postgres-data:
