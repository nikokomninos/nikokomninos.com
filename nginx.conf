server {
  listen 80;
  server_name _;
  absolute_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://api:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}

server {
  listen 80;
  server_name nikokomninos.com www.nikokomninos.com;
  absolute_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ =404;
  }
}

server {
  listen 80;
  server_name events.nikokomninos.com;
  absolute_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    try_files /events/index.html =404;
  }

  location /_astro/ {
    try_files $uri =404;
  }

  location /favicon.svg {
    try_files $uri =404;
  }

  location /favicon.ico {
    try_files $uri =404;
  }

  location / {
    try_files $uri /events$uri/index.html /events$uri =404;
  }
}
